# Splunk Forwarder Configuration for K8s Audit Logs
[monitor:///var/log/kubernetes/audit.log]
index = k8s_security_audit
sourcetype = kube:audit
disabled = 0

# Alerting Logic: High-Frequency 403 Forbidden Errors (Potential Breach)
[alert_unauthorized_access]
search = index=k8s_security_audit status=403 | stats count by user
alert_threshold = 10
alert_comparator = greater than
window = 5m
